name: 'master_build'
on:
  repository_dispatch:
  push:
    branches: [ master ]

# contents: write is required by scm-publish to push the Maven site to gh-pages
permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  MAVEN_OPTS: -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

jobs:
  build_job:
    runs-on: ubuntu-latest
    name: Build & Test Microservice
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: 25
          cache: maven

      - name: Check version
        id: version-check
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Project version: $VERSION"
          if [[ "$VERSION" =~ -SNAPSHOT$ ]]; then
            echo "⚠️ Version is snapshot: $VERSION - skipping publish"
            echo "should_publish=false" >> $GITHUB_OUTPUT
            VERSION=latest
          else
            echo "✅ Version is not a snapshot: $VERSION - will publish"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: s4u/maven-settings-action@v4.0.0
        with:
          servers: |
            [{
              "id": "central",
              "username": "${{ secrets.OSSRH_USERNAME }}",
              "password": "${{ secrets.OSSRH_PASSWORD }}"
            },
            {
              "id": "central-portal-snapshots",
              "username": "${{ secrets.OSSRH_USERNAME }}",
              "password": "${{ secrets.OSSRH_PASSWORD }}"
            }]

      - name: Import GPG key
        if: steps.version-check.outputs.should_publish == 'true'
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Build
        if: steps.version-check.outputs.should_publish == 'false'
        run: >
          ./mvnw clean verify
          -Dci.buildNumber=$GITHUB_RUN_NUMBER
          -U -B $MAVEN_OPTS

      - name: Build & Deploy to Maven Central
        if: steps.version-check.outputs.should_publish == 'true'
        run: >
          ./mvnw clean deploy
          -Dci.buildNumber=$GITHUB_RUN_NUMBER
          -U -B -Prelease,release-central,gpg $MAVEN_OPTS

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          retention-days: 7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: interface21/openwms-services:${{ steps.version-check.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install tools
        if: steps.version-check.outputs.should_publish == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install graphviz gsfonts graphviz-doc
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Site
        if: steps.version-check.outputs.should_publish == 'true'
        run: >
          ./mvnw post-integration-test site scm-publish:publish-scm
          -DsurefireArgs=-Dspring.profiles.active=TEST
          -Dargs=-Dspring.profiles.active=TEST
          -Dscmpublish.pubScmUrl=scm:git:https://openwms:$PUSHKEY@github.com/spring-labs/org.openwms.services.git
          -DdeveloperConnectionUrl=scm:git:https://openwms:$PUSHKEY@github.com/spring-labs/org.openwms.services.git
          -Dci.buildNumber=$GITHUB_RUN_NUMBER
          -Prelease,coverage -B $MAVEN_OPTS
        env:
          PUSHKEY: ${{ secrets.GITHUB_TOKEN }}
